<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Print — Wisdom Johnson</title>
  <style>
    @page {
      size: letter;
      margin: 0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 8.5in;
      height: 11in;
      overflow: hidden;
      background: #fff;
    }

    img {
      width: 8.5in;
      height: 11in;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .print-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      box-shadow: 0 4px 15px rgba(30,58,138,0.4);
      z-index: 1000;
    }

    @media print {
      .print-btn { display: none; }
    }
  </style>
</head>
<body>
  <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
  <img src="unnamed.jpg" alt="Wisdom Johnson">
</body>
</html>
