<h2 class="page-title">College Tracker</h2>
<p class="page-subtitle">Track application deadlines, portal statuses, and decisions. Statuses save automatically.</p>

<div class="grid-4">
  <div class="stat-tile"><div class="val" id="col-applied">0</div><div class="lbl">Applied</div></div>
  <div class="stat-tile"><div class="val" id="col-awaiting">0</div><div class="lbl">Awaiting Decision</div></div>
  <div class="stat-tile"><div class="val" id="col-accepted">0</div><div class="lbl">Accepted</div></div>
  <div class="stat-tile"><div class="val" id="col-deferred">0</div><div class="lbl">Deferred / Denied</div></div>
</div>

<div class="section-label">Schools</div>
<div class="card" style="overflow-x:auto;">
  <table style="width:100%;border-collapse:collapse;font-size:13px;">
    <thead>
      <tr style="background:var(--gray-100);text-align:left;">
        <th style="padding:10px 12px;">School</th>
        <th style="padding:10px 12px;">Type</th>
        <th style="padding:10px 12px;">Deadline</th>
        <th style="padding:10px 12px;">Status</th>
        <th style="padding:10px 12px;">Notes</th>
      </tr>
    </thead>
    <tbody id="colleges-tbody">
      <tr style="border-top:1px solid var(--gray-200);">
        <td style="padding:10px 12px;font-weight:600;">NC A&amp;T State University</td>
        <td style="padding:10px 12px;">HBCU / Public</td>
        <td style="padding:10px 12px;">Rolling</td>
        <td style="padding:10px 12px;">
          <select class="college-status" data-school="NCAT" onchange="saveCollegeStatus(this);updateCollegeTiles()" style="font-size:12px;padding:3px 6px;border-radius:6px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800);">
            <option>Not Started</option>
            <option>In Progress</option>
            <option>Submitted</option>
            <option>Awaiting Decision</option>
            <option>Accepted</option>
            <option>Deferred</option>
            <option>Denied</option>
          </select>
        </td>
        <td style="padding:10px 12px;">Primary target. Mechanical Engineering.</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
function saveCollegeStatus(sel) {
  localStorage.setItem('college_' + sel.dataset.school, sel.value);
}

function updateCollegeTiles() {
  var rows = document.querySelectorAll('.college-status');
  var applied = 0, awaiting = 0, accepted = 0, deferred = 0;
  rows.forEach(function(sel) {
    var v = sel.value;
    if (v === 'Submitted' || v === 'Awaiting Decision' || v === 'Accepted' || v === 'Deferred' || v === 'Denied') applied++;
    if (v === 'Awaiting Decision') awaiting++;
    if (v === 'Accepted') accepted++;
    if (v === 'Deferred' || v === 'Denied') deferred++;
  });
  document.getElementById('col-applied').textContent = applied;
  document.getElementById('col-awaiting').textContent = awaiting;
  document.getElementById('col-accepted').textContent = accepted;
  document.getElementById('col-deferred').textContent = deferred;
}

// Restore saved statuses
document.querySelectorAll('.college-status').forEach(function(sel) {
  var saved = localStorage.getItem('college_' + sel.dataset.school);
  if (saved) sel.value = saved;
});
updateCollegeTiles();
</script>
