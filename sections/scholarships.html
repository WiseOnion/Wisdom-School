<h2 class="page-title">Scholarship Tracker</h2>
<p class="page-subtitle">Your personal record. Every scholarship you applied to, all in one place.</p>

<!-- STAT TILES + ADD BUTTON -->
<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap">
  <div class="grid-4" style="flex:1;min-width:0">
    <div class="stat-tile"><div class="val" id="sc-total">0</div><div class="lbl">Total Applied</div></div>
    <div class="stat-tile"><div class="val" id="sc-pending">0</div><div class="lbl">Pending</div></div>
    <div class="stat-tile"><div class="val" id="sc-awarded">0</div><div class="lbl">Awarded</div></div>
    <div class="stat-tile"><div class="val" id="sc-money" style="font-size:22px">$0</div><div class="lbl">Total Awarded</div></div>
  </div>
  <button onclick="scOpenModal()" class="btn btn-gold" style="padding:12px 24px;font-size:14px;white-space:nowrap;align-self:center">+ Add</button>
</div>

<!-- TABLE -->
<div class="card" style="padding:0;overflow:hidden">
  <table style="width:100%;border-collapse:collapse;font-size:13px">
    <thead>
      <tr>
        <th style="width:22%">Scholarship</th>
        <th style="width:10%">Amount</th>
        <th style="width:11%">Applied</th>
        <th style="width:11%">Decision</th>
        <th style="width:11%">Status</th>
        <th style="width:20%">Notes</th>
        <th style="width:8%">Photo</th>
        <th style="width:7%"></th>
      </tr>
    </thead>
    <tbody id="sc-body">
      <tr><td colspan="8" style="text-align:center;padding:28px;color:var(--gray-400);font-size:13px">No scholarships added yet. Hit <strong>+ Add</strong> to log your first one.</td></tr>
    </tbody>
  </table>
</div>

<script>
var scData = JSON.parse(localStorage.getItem('sc_entries') || 'null');

if (!scData || !Array.isArray(scData) || scData.length === 0) {
  scData = [
    { id: 1, name: 'ASHRAE High School Senior Scholarship', amount: '3000', date: '2026-04-16', decision: '2026-05-01', status: 'pending', notes: 'Four $3,000 awards. Pre-engineering/HVAC&R focus.', photo: '' },
    { id: 2, name: 'ERLY Scholarship', amount: '', date: '2026-04-16', decision: '', status: 'pending', notes: 'Essay-based. Science, creativity, entrepreneurship, service.', photo: '' }
  ];
  localStorage.setItem('sc_entries', JSON.stringify(scData));
}

function scOpenModal() {
  document.getElementById('sc-modal').style.display = 'block';
  document.getElementById('sc-modal-overlay').style.display = 'block';
  document.getElementById('sc-photo-preview').innerHTML = '';
  document.getElementById('sc-photo').value = '';
  document.getElementById('sc-name').focus();
}

function scCloseModal() {
  document.getElementById('sc-modal').style.display = 'none';
  document.getElementById('sc-modal-overlay').style.display = 'none';
}

document.addEventListener('keydown', function(e){ if(e.key==='Escape') scCloseModal(); });

document.getElementById('sc-photo').addEventListener('change', function() {
  var preview = document.getElementById('sc-photo-preview');
  preview.innerHTML = '';
  if (this.files && this.files[0]) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = document.createElement('img');
      img.src = ev.target.result;
      img.style.cssText = 'max-width:100%;max-height:120px;border-radius:6px;border:1px solid var(--gray-200)';
      preview.appendChild(img);
    };
    reader.readAsDataURL(this.files[0]);
  }
});

function scAdd() {
  var name = document.getElementById('sc-name').value.trim();
  if (!name) { document.getElementById('sc-name').focus(); return; }
  var photoFile = document.getElementById('sc-photo').files[0];
  if (photoFile) {
    var reader = new FileReader();
    reader.onload = function(ev) { scFinishAdd(name, ev.target.result); };
    reader.readAsDataURL(photoFile);
  } else {
    scFinishAdd(name, '');
  }
}

function scFinishAdd(name, photoData) {
  var entry = {
    id: Date.now(),
    name: name,
    amount: document.getElementById('sc-amount').value.trim(),
    date: document.getElementById('sc-date').value,
    decision: document.getElementById('sc-decision').value,
    status: document.getElementById('sc-status').value,
    notes: document.getElementById('sc-notes').value.trim(),
    photo: photoData
  };
  scData.push(entry);
  scSave();
  ['sc-name','sc-amount','sc-notes'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('sc-date').value = '';
  document.getElementById('sc-decision').value = '';
  document.getElementById('sc-status').value = 'pending';
  document.getElementById('sc-photo').value = '';
  document.getElementById('sc-photo-preview').innerHTML = '';
  scCloseModal();
}

function scSave() {
  localStorage.setItem('sc_entries', JSON.stringify(scData));
  scRender();
}

function scDelete(id) {
  if (!confirm('Remove this entry?')) return;
  scData = scData.filter(function(e){ return e.id !== id; });
  scSave();
}

function scChangeStatus(id, val) {
  var entry = scData.find(function(e){ return e.id === id; });
  if (entry) { entry.status = val; scSave(); }
}

function scShowPhoto(src) {
  document.getElementById('sc-lightbox-img').src = src;
  document.getElementById('sc-lightbox').style.display = 'flex';
}

function scShowPhotoById(imgEl) {
  scShowPhoto(imgEl.src);
}

function scRender() {
  var tbody = document.getElementById('sc-body');
  tbody.innerHTML = '';

  if (!scData.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:28px;color:var(--gray-400);font-size:13px">No scholarships added yet. Hit <strong>+ Add</strong> to log your first one.</td></tr>';
    document.getElementById('sc-total').textContent = '0';
    document.getElementById('sc-pending').textContent = '0';
    document.getElementById('sc-awarded').textContent = '0';
    document.getElementById('sc-money').textContent = '$0';
    return;
  }

  var totalMoney = 0, pending = 0, awarded = 0;
  var today = new Date(); today.setHours(0,0,0,0);

  scData.forEach(function(e) {
    var amtNum = parseFloat((e.amount||'').replace(/[^0-9.]/g,'')) || 0;
    var amtDisplay = amtNum > 0 ? '$' + amtNum.toLocaleString() : '—';

    if (e.status === 'pending') pending++;
    if (e.status === 'awarded') { awarded++; totalMoney += amtNum; }

    var decisionDisplay = '—';
    if (e.decision) {
      var decDate = new Date(e.decision + 'T00:00:00');
      var daysAway = Math.ceil((decDate - today) / 86400000);
      if (daysAway < 0) {
        decisionDisplay = '<span style="color:var(--gray-400)">' + e.decision + '</span>';
      } else if (daysAway <= 14) {
        decisionDisplay = '<span style="color:#d97706;font-weight:700">' + e.decision + ' (' + daysAway + 'd)</span>';
      } else {
        decisionDisplay = e.decision;
      }
    }

    var photoCell = e.photo
      ? '<img src="' + e.photo + '" onclick="scShowPhotoById(this)" style="width:36px;height:36px;object-fit:cover;border-radius:5px;cursor:zoom-in;border:1px solid var(--gray-200)" title="View screenshot">'
      : '<span style="color:var(--gray-400);font-size:11px">—</span>';

    var tr = document.createElement('tr');
    tr.style.borderTop = '1px solid var(--gray-200)';
    tr.innerHTML =
      '<td style="padding:12px 14px;font-weight:600">' + e.name + '</td>' +
      '<td style="padding:12px 14px;color:#15803d;font-weight:700">' + amtDisplay + '</td>' +
      '<td style="padding:12px 14px">' + (e.date || '—') + '</td>' +
      '<td style="padding:12px 14px">' + decisionDisplay + '</td>' +
      '<td style="padding:12px 14px"><select onchange="scChangeStatus(' + e.id + ',this.value)" style="font-size:12px;padding:3px 6px;border-radius:6px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-800)">' +
        '<option value="pending"'      + (e.status==='pending'      ? ' selected':'') + '>Pending</option>' +
        '<option value="awarded"'      + (e.status==='awarded'      ? ' selected':'') + '>Awarded</option>' +
        '<option value="not-selected"' + (e.status==='not-selected' ? ' selected':'') + '>Not Selected</option>' +
      '</select></td>' +
      '<td style="padding:12px 14px;color:var(--gray-600);font-size:12px">' + (e.notes || '—') + '</td>' +
      '<td style="padding:12px 14px;text-align:center">' + photoCell + '</td>' +
      '<td style="padding:12px 14px;text-align:center"><button onclick="scDelete(' + e.id + ')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px" title="Remove">&#x2715;</button></td>';
    tbody.appendChild(tr);
  });

  document.getElementById('sc-total').textContent = scData.length;
  document.getElementById('sc-pending').textContent = pending;
  document.getElementById('sc-awarded').textContent = awarded;
  document.getElementById('sc-money').textContent = totalMoney > 0 ? '$' + totalMoney.toLocaleString() : '$0';
}

scRender();
</script>
